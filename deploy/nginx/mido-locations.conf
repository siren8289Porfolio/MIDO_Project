# portfolio-nginx 의 default.conf 안에 넣을 MIDO 블록
# 경로: ~/my-portfolio/deploy/nginx/default.conf
#
# 잘못된 예 (화면 대신 헬스 JSON만 보임):
#   location = /mido/ { proxy_pass http://mido-app:8080/mido/actuator/health; }
#
# 적용 후:
#   docker exec portfolio-nginx nginx -t
#   docker restart portfolio-nginx

# 헬스체크 — UI 경로(/mido/)와 분리
location = /mido/actuator/health {
    proxy_pass http://mido-app:8080/actuator/health;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location = /mido {
    return 301 /mido/;
}

# UI → Next.js (mido-web)
location /mido/ {
    proxy_pass http://mido-web:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
}

# API → Spring Boot (mido-app)
location /api/ {
    proxy_pass http://mido-app:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    client_max_body_size 20M;
}
