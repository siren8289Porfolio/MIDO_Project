# portfolio-nginx default.conf 에 넣을 MIDO 라우팅
# Next basePath=/mido — /mido 와 /mido/ 모두 proxy (리다이렉트 루프 방지)
# /mido, /mido/       → mido-web (UI)
# /mido/api/          → mido-app (API)
# /mido/actuator/health → mido-app (헬스)

location = /mido/actuator/health {
    proxy_pass http://mido-app:8080/actuator/health;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# /mido → /mido/ 리다이렉트 금지 (Next가 /mido/ → /mido 로 보내 무한루프)
location = /mido {
    proxy_pass http://mido-web:3000/mido;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location /mido/api/ {
    proxy_pass http://mido-app:8080/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    client_max_body_size 20M;
}

location /mido/ {
    proxy_pass http://mido-web:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
}
