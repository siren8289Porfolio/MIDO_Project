# portfolio-nginx default.conf 에 넣을 MIDO 라우팅
#
# 프론트 요청: /mido/api/verifications/manual
# Spring 실제: /api/verifications/manual
# → /mido/api/ 만 prefix 제거 후 mido-app 으로
#
# UI(/mido, /mido/, /mido/_next) 는 mido-web (전부 mido-app 으로내면 Tomcat 404)

location = /mido/actuator/health {
    proxy_pass http://mido-app:8080/actuator/health;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# /mido/api/X → http://mido-app:8080/api/X  (prefix strip)
location ^~ /mido/api/ {
    rewrite ^/mido/api/(.*)$ /api/$1 break;
    proxy_pass http://mido-app:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    client_max_body_size 20M;
}

# UI only — mido-web (Next basePath=/mido)
location ^~ /mido {
    proxy_pass http://mido-web:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
}
