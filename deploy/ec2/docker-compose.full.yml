# MIDO 전체 스택 (my-portfolio compose에 mido 서비스가 없을 때 사용)
# remote-deploy.sh 가 자동으로 -f docker-compose.full.yml 로 기동합니다.

services:
  mido-db:
    image: postgres:16-alpine
    container_name: mido-db
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      POSTGRES_DB: mido
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - mido_pg_data:/var/lib/postgresql/data
    networks:
      - mido-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d mido"]
      interval: 10s
      timeout: 5s
      retries: 5

  mido-app:
    image: ghcr.io/siren8289porfolio/portfolio-mido:latest
    container_name: mido-app
    restart: unless-stopped
    env_file:
      - ../.env
    depends_on:
      mido-db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://mido-db:5432/mido
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    expose:
      - "8080"
    networks:
      - nginx-network
      - mido-internal

  mido-web:
    image: ghcr.io/siren8289porfolio/portfolio-mido-web:latest
    container_name: mido-web
    restart: unless-stopped
    depends_on:
      - mido-app
    environment:
      API_URL: http://mido-app:8080
    expose:
      - "3000"
    networks:
      - nginx-network

networks:
  nginx-network:
    external: true
  mido-internal:
    driver: bridge

volumes:
  mido_pg_data:
