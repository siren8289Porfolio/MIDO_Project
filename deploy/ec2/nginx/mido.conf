# Docker nginx (nginx-network) — mido-web / mido-app 컨테이너명으로 프록시
# server_name 은 setup-nginx.sh 가 MIDO_SERVER_NAME 으로 치환합니다.

upstream mido_frontend {
    server mido-web:3000;
}

upstream mido_backend {
    server mido-app:8080;
}

server {
    listen 80;
    server_name mido.example.com;

    client_max_body_size 20M;

    location /api/ {
        proxy_pass http://mido_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://mido_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
