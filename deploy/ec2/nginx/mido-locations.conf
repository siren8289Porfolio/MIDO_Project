# portfolio-nginx default.conf 에 넣을 MIDO 라우팅
#
# Spring prod: server.servlet.context-path=/mido
# 프론트:     /mido/api/verifications/manual
# Spring:     /mido/api/verifications/manual  (URI 그대로 전달, strip 하지 않음)
#
# UI(/mido, /mido/, /mido/_next) → mido-web
# API(/mido/api/...)             → mido-app (전체 경로 유지)

location = /mido/actuator/health {
    proxy_pass http://mido-app:8080/mido/actuator/health;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# URI 그대로 mido-app 으로 (끝에 / 붙이지 말 것)
location ^~ /mido/api/ {
    proxy_pass http://mido-app:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    client_max_body_size 20M;
}

# UI only — mido-web (Next basePath=/mido)
location ^~ /mido {
    proxy_pass http://mido-web:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
}
