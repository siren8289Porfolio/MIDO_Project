# portfolio-nginx default.conf 에 넣을 MIDO 라우팅
# ^~ 로 다른 location 보다 우선. UI는 mido-web, API만 mido-app.
#
# /mido, /mido/, /mido/_next/... → mido-web (Next basePath=/mido)
# /mido/api/...                  → mido-app
# /mido/actuator/health          → mido-app

location = /mido/actuator/health {
    proxy_pass http://mido-app:8080/actuator/health;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# API는 Spring으로 직접 (경로 rewrite: /mido/api/X → /api/X)
# 이 블록이 없으면 /mido 가 mido-web 으로 가고, Next Route Handler가 프록시함
location ^~ /mido/api/ {
    proxy_pass http://mido-app:8080/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    client_max_body_size 20M;
}

# /mido 와 /mido/ 모두 Next로 (Spring mido-app 으로 가면 Tomcat 404)
location ^~ /mido {
    proxy_pass http://mido-web:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
}
