# MIDO 단일 compose — CI/EC2 는 이 파일만 사용
# remote-deploy.sh 가 --env-file /home/ubuntu/my-portfolio/.env 로 실행
# COMPOSE_PROJECT_NAME=portfolio

services:
  mido-db:
    image: postgres:16-alpine
    container_name: mido-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: mido
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - mido_pg_data:/var/lib/postgresql/data
    networks:
      - portfolio-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d mido"]
      interval: 10s
      timeout: 5s
      retries: 5

  mido-app:
    image: ghcr.io/siren8289porfolio/portfolio-mido:latest
    container_name: mido-app
    restart: unless-stopped
    depends_on:
      mido-db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://mido-db:5432/mido
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    expose:
      - "8080"
    networks:
      - portfolio-network

  mido-web:
    image: ghcr.io/siren8289porfolio/portfolio-mido-web:latest
    container_name: mido-web
    restart: unless-stopped
    depends_on:
      - mido-app
    environment:
      API_URL: http://mido-app:8080
      API_CONTEXT_PATH: /mido
    expose:
      - "3000"
    networks:
      - portfolio-network

  portfolio-nginx:
    image: nginx:alpine
    container_name: portfolio-nginx
    restart: unless-stopped
    depends_on:
      - mido-app
      - mido-web
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/mido-locations.conf:/etc/nginx/mido-locations.conf:ro
    networks:
      - portfolio-network

networks:
  portfolio-network:
    name: portfolio-network
    driver: bridge

volumes:
  mido_pg_data:
