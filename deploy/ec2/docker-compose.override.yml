# my-portfolio docker-compose.yml 에 mido-app 이 이미 있을 때 merge 용
# mido-web 만 추가합니다.

services:
  mido-web:
    image: ghcr.io/siren8289porfolio/portfolio-mido-web:latest
    container_name: mido-web
    restart: unless-stopped
    depends_on:
      - mido-app
    environment:
      API_URL: http://mido-app:8080
    expose:
      - "3000"
    networks:
      - portfolio-network

networks:
  portfolio-network:
    external: true
