name: Deploy Mido

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: mido
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d mido"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    permissions:
      packages: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Test backend
        working-directory: spring
        env:
          SPRING_PROFILES_ACTIVE: test
        run: ./gradlew test --no-daemon

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Test web build
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/siren8289porfolio/portfolio-mido:latest
            ghcr.io/siren8289porfolio/portfolio-mido:${{ github.sha }}

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: ./web
          file: ./web/Dockerfile
          push: true
          tags: |
            ghcr.io/siren8289porfolio/portfolio-mido-web:latest
            ghcr.io/siren8289porfolio/portfolio-mido-web:${{ github.sha }}

      - name: Copy mido-web compose override to EC2
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          port: ${{ secrets.EC2_PORT }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "deploy/docker-compose.mido-web.yml"
          target: "/home/ubuntu/my-portfolio"
          strip_components: 1

      - name: Copy nginx mido locations to EC2
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          port: ${{ secrets.EC2_PORT }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "deploy/nginx/mido-locations.conf"
          target: "/home/ubuntu/my-portfolio/deploy/nginx"
          strip_components: 2

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          port: ${{ secrets.EC2_PORT }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /home/ubuntu/my-portfolio

            # portfolio compose 탐색 (mido-web 오버라이드 파일은 제외)
            MAIN=""
            for f in compose.yaml compose.yml docker-compose.yaml docker-compose.yml \
              deploy/compose.yaml deploy/compose.yml deploy/docker-compose.yaml deploy/docker-compose.yml; do
              if [ -f "$f" ]; then
                MAIN="$f"
                break
              fi
            done

            if [ -z "$MAIN" ]; then
              for f in ./*.yml ./*.yaml deploy/*.yml deploy/*.yaml; do
                [ -f "$f" ] || continue
                case "$f" in
                  ./docker-compose.mido-web.yml|docker-compose.mido-web.yml) continue ;;
                esac
                if grep -qE '^[[:space:]]{2}mido-app:' "$f"; then
                  MAIN="$f"
                  break
                fi
              done
            fi

            if [ -n "$MAIN" ] && docker compose -f "$MAIN" config --services 2>/dev/null | grep -qx mido-app; then
              echo "Using compose: $MAIN + docker-compose.mido-web.yml"
              docker compose -f "$MAIN" -f docker-compose.mido-web.yml pull mido-app mido-web
              docker compose -f "$MAIN" -f docker-compose.mido-web.yml up -d mido-app mido-web
            else
              echo "mido-app compose not found — deploying mido-web only (mido-app already running)"
              docker compose -f docker-compose.mido-web.yml pull mido-web
              docker compose -f docker-compose.mido-web.yml up -d mido-web
            fi

            # Nginx: /mido* → mido-web (UI), /mido/api/ → mido-app (API)
            # Tomcat 404 HTML = UI 가 mido-app(Spring)으로 간 것
            python3 << 'PY'
            from pathlib import Path
            import re

            conf = Path("/home/ubuntu/my-portfolio/deploy/nginx/default.conf")
            snippet = Path("/home/ubuntu/my-portfolio/deploy/nginx/mido-locations.conf")
            if not conf.exists() or not snippet.exists():
                print("nginx conf/snippet missing, skip patch")
                raise SystemExit(0)

            locations = "\n".join(
                line for line in snippet.read_text().splitlines()
                if line.strip() and not line.strip().startswith("#")
            ).strip()

            text = conf.read_text()
            # /mido 관련 location 전부 제거 후 올바른 블록 1회 삽입
            text = re.sub(
                r"\n?[ \t]*location\s+[^{;\n]*mido[^{;\n]*\{[^{}]*\}",
                "",
                text,
            )
            text = re.sub(r"(server\s*\{)", r"\1\n\n" + locations + "\n", text, count=1)
            conf.write_text(text)
            for line in conf.read_text().splitlines():
                if "mido" in line.lower():
                    print(line)
            print("nginx default.conf patched: /mido* → mido-web")
            PY

            if ! docker ps --format '{{.Names}}' | grep -qx mido-web; then
              echo "ERROR: mido-web container is not running"
              docker ps -a --filter name=mido
              exit 1
            fi

            if docker ps --format '{{.Names}}' | grep -qx portfolio-nginx; then
              docker exec portfolio-nginx nginx -t
              docker restart portfolio-nginx
              sleep 2
              # UI 가 Spring(Tomcat) 404 가 아닌지 확인
              CODE=$(curl -s -o /tmp/mido-check.html -w '%{http_code}' http://127.0.0.1/mido/ || true)
              if grep -q 'HTTP Status 404' /tmp/mido-check.html 2>/dev/null; then
                echo "ERROR: /mido/ still returns Spring Tomcat 404 — nginx routing wrong"
                grep -n 'mido' /home/ubuntu/my-portfolio/deploy/nginx/default.conf || true
                exit 1
              fi
              echo "GET /mido/ => HTTP $CODE"
            fi

            docker image prune -f
            docker ps --filter name=mido --format 'table {{.Names}}\t{{.Status}}\t{{.Image}}'
