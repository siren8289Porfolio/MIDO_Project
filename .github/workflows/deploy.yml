name: Deploy Mido

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: mido
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d mido"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    permissions:
      packages: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Test backend
        working-directory: spring
        env:
          SPRING_PROFILES_ACTIVE: test
        run: ./gradlew test --no-daemon

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Test web build
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/siren8289porfolio/portfolio-mido:latest
            ghcr.io/siren8289porfolio/portfolio-mido:${{ github.sha }}

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: ./web
          file: ./web/Dockerfile
          push: true
          tags: |
            ghcr.io/siren8289porfolio/portfolio-mido-web:latest
            ghcr.io/siren8289porfolio/portfolio-mido-web:${{ github.sha }}

      - name: Copy deploy files to EC2
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          port: ${{ secrets.EC2_PORT }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "deploy/docker-compose.mido-web.yml,deploy/nginx/mido-locations.conf,deploy/ec2/fix-nginx-mido.sh"
          target: "/home/ubuntu/my-portfolio/mido-incoming"

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          port: ${{ secrets.EC2_PORT }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /home/ubuntu/my-portfolio
            mkdir -p deploy/nginx

            # scp 가 만든 경로에서 파일 배치
            if [ -f mido-incoming/deploy/docker-compose.mido-web.yml ]; then
              cp mido-incoming/deploy/docker-compose.mido-web.yml ./docker-compose.mido-web.yml
              cp mido-incoming/deploy/nginx/mido-locations.conf ./deploy/nginx/mido-locations.conf
              cp mido-incoming/deploy/ec2/fix-nginx-mido.sh ./deploy/fix-nginx-mido.sh
            elif [ -f mido-incoming/docker-compose.mido-web.yml ]; then
              cp mido-incoming/docker-compose.mido-web.yml ./docker-compose.mido-web.yml
              cp mido-incoming/mido-locations.conf ./deploy/nginx/mido-locations.conf
              cp mido-incoming/fix-nginx-mido.sh ./deploy/fix-nginx-mido.sh
            fi

            # mido-app 이미지가 있으면 같이 pull (compose 에 있을 때만)
            MAIN=""
            for f in compose.yaml compose.yml docker-compose.yaml docker-compose.yml; do
              [ -f "$f" ] || continue
              MAIN="$f"
              break
            done
            if [ -n "$MAIN" ] && grep -q 'mido-app:' "$MAIN" 2>/dev/null; then
              docker compose -f "$MAIN" -f docker-compose.mido-web.yml pull mido-app mido-web || true
              docker compose -f "$MAIN" -f docker-compose.mido-web.yml up -d mido-app mido-web || true
            fi

            chmod +x deploy/fix-nginx-mido.sh
            bash deploy/fix-nginx-mido.sh
            docker image prune -f
