name: Deploy Mido

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: mido
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d mido"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    permissions:
      packages: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Test backend
        working-directory: spring
        env:
          SPRING_PROFILES_ACTIVE: test
        run: ./gradlew test --no-daemon

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Test web build
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/siren8289porfolio/portfolio-mido:latest
            ghcr.io/siren8289porfolio/portfolio-mido:${{ github.sha }}

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: ./web
          file: ./web/Dockerfile
          push: true
          tags: |
            ghcr.io/siren8289porfolio/portfolio-mido-web:latest
            ghcr.io/siren8289porfolio/portfolio-mido-web:${{ github.sha }}

      - name: Copy mido-web compose override to EC2
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          port: ${{ secrets.EC2_PORT }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "deploy/docker-compose.mido-web.yml"
          target: "/home/ubuntu/my-portfolio"
          strip_components: 1

      - name: Copy nginx mido locations to EC2
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          port: ${{ secrets.EC2_PORT }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "deploy/nginx/mido-locations.conf"
          target: "/home/ubuntu/my-portfolio/deploy/nginx"
          strip_components: 2

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          port: ${{ secrets.EC2_PORT }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /home/ubuntu/my-portfolio

            COMPOSE_FILES="-f docker-compose.yml"
            if [ -f docker-compose.mido-web.yml ]; then
              COMPOSE_FILES="$COMPOSE_FILES -f docker-compose.mido-web.yml"
            fi

            docker compose $COMPOSE_FILES pull mido-app mido-web
            docker compose $COMPOSE_FILES up -d mido-app mido-web

            # Nginx: /mido/ 헬스체크 → UI(mido-web) + API(mido-app) 라우팅으로 교체
            python3 << 'PY'
            from pathlib import Path
            import re

            conf = Path("/home/ubuntu/my-portfolio/deploy/nginx/default.conf")
            snippet = Path("/home/ubuntu/my-portfolio/deploy/nginx/mido-locations.conf")
            if not conf.exists() or not snippet.exists():
                print("nginx conf/snippet missing, skip patch")
                raise SystemExit(0)

            locations = "\n".join(
                line for line in snippet.read_text().splitlines()
                if line.strip() and not line.strip().startswith("#")
            ).strip()

            text = conf.read_text()
            # 기존 mido 관련 location 전부 제거
            text = re.sub(
                r"\n?[ \t]*location\s+(?:=\s+)?/mido(?:/actuator/health|/api/|/)?\s*\{[^{}]*\}",
                "",
                text,
            )
            # server { 직후에 올바른 라우팅 삽입
            text = re.sub(r"(server\s*\{)", r"\1\n\n" + locations + "\n", text, count=1)
            conf.write_text(text)
            print("nginx default.conf updated for mido-web + mido-app")
            PY

            if docker ps --format '{{.Names}}' | grep -qx portfolio-nginx; then
              docker exec portfolio-nginx nginx -t
              docker restart portfolio-nginx
            fi

            docker image prune -f
            docker ps --filter name=mido --format 'table {{.Names}}\t{{.Status}}\t{{.Image}}'
