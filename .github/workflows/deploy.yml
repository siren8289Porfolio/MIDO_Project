name: Deploy Mido

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: mido
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d mido"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    permissions:
      packages: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Test backend
        working-directory: spring
        env:
          SPRING_PROFILES_ACTIVE: test
        run: ./gradlew test --no-daemon

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Test web build
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/siren8289porfolio/portfolio-mido:latest
            ghcr.io/siren8289porfolio/portfolio-mido:${{ github.sha }}

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: ./web
          file: ./web/Dockerfile
          push: true
          tags: |
            ghcr.io/siren8289porfolio/portfolio-mido-web:latest
            ghcr.io/siren8289porfolio/portfolio-mido-web:${{ github.sha }}

      - name: Copy deploy assets to EC2
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          port: ${{ secrets.EC2_PORT }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "deploy/ec2/docker-compose.full.yml,deploy/ec2/docker-compose.override.yml,deploy/ec2/remote-deploy.sh,deploy/ec2/setup-nginx.sh"
          target: "/home/ubuntu/my-portfolio/mido-deploy"

      - name: Copy nginx configs to EC2
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          port: ${{ secrets.EC2_PORT }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "deploy/ec2/nginx/mido.conf,deploy/ec2/nginx/mido-locations.conf"
          target: "/home/ubuntu/my-portfolio/mido-deploy/nginx"

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        env:
          SETUP_NGINX: ${{ secrets.MIDO_SETUP_NGINX }}
          MIDO_SERVER_NAME: ${{ secrets.MIDO_SERVER_NAME }}
        with:
          host: ${{ secrets.EC2_HOST }}
          port: ${{ secrets.EC2_PORT }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: SETUP_NGINX,MIDO_SERVER_NAME
          script: |
            chmod +x /home/ubuntu/my-portfolio/mido-deploy/remote-deploy.sh
            chmod +x /home/ubuntu/my-portfolio/mido-deploy/setup-nginx.sh
            /home/ubuntu/my-portfolio/mido-deploy/remote-deploy.sh
